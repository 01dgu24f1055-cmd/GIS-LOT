<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html, body, #map {
    height: 100%;
    margin: 0;
}
</style>
</head>

<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- GANTI dengan file geojson export Anda -->
<script src="data/DASHPOLYGONPA12_0.js"></script>

<script>

// =============================
// BUAT MAP
// =============================
var map = L.map('map').setView([2.1035, 102.5235], 18);


// =============================
// BASEMAP
// =============================
var osm = L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { attribution: '© OpenStreetMap contributors' }
);

var satellite = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { attribution: 'Tiles © Esri' }
).addTo(map);


// =============================
// STYLE POLYGON
// =============================
function stylePolygon() {
    return {
        color: "#000000",
        weight: 1,
        fillColor: "#e87148",
        fillOpacity: 0.8
    };
}


// =============================
// LAYER POLYGON
// =============================
var polygonLayer = L.geoJSON(json_DASHPOLYGONPA12_0, {
    style: stylePolygon
}).addTo(map);


// =============================
// LAYER VERTEX (TOTOL)
// =============================
var vertexLayer = L.layerGroup();

polygonLayer.eachLayer(function(layer) {

    if (layer.feature.geometry.type === "Polygon") {

        layer.feature.geometry.coordinates[0].forEach(function(coord) {

            var marker = L.circleMarker(
                [coord[1], coord[0]],
                {
                    radius: 4,
                    color: "#000",
                    weight: 1,
                    fillColor: "#ffcc00",
                    fillOpacity: 1
                }
            );

            vertexLayer.addLayer(marker);

        });

    }

});

vertexLayer.addTo(map);


// =============================
// LAYER CONTROL
// =============================
L.control.layers(
    {
        "OpenStreetMap": osm,
        "Satellite": satellite
    },
    {
        "Lot Polygon": polygonLayer,
        "Vertex (Totol)": vertexLayer
    },
    { collapsed: false }
).addTo(map);

</script>
</body>
</html>

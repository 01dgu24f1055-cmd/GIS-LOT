<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
<link rel="stylesheet" href="css/leaflet.css">
<link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
<link rel="stylesheet" href="css/qgis2web.css">
<link rel="stylesheet" href="css/fontawesome-all.min.css">

<style>
html, body, #map {
    width: 100%;
    height: 100%;
    padding: 0;
    margin: 0;
}
</style>
</head>

<body>
<div id="map"></div>

<script src="js/leaflet.js"></script>
<script src="js/leaflet-hash.js"></script>
<script src="js/Autolinker.min.js"></script>

<script src="data/DASHPOLYGONPA12_0.js"></script>
<script src="data/DASHPOLYGONPA13_1.js"></script>

<script>

// ===============================
// CREATE MAP
// ===============================
var map = L.map('map', {
    zoomControl: true,
    maxZoom: 28,
    minZoom: 1
}).fitBounds([[2.1026,102.5191],[2.1055,102.5278]]);


// ===============================
// BASEMAPS
// ===============================

// OpenStreetMap
var osm = L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution: '© OpenStreetMap contributors'
    }
);

// ESRI SATELLITE
var satellite = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    {
        attribution: 'Tiles © Esri'
    }
).addTo(map); // default layer


// ===============================
// SAMPLE QGIS2WEB LAYER
// ===============================

function styleLayer() {
    return {
        color: "#000000",
        weight: 1,
        fillColor: "#e87148",
        fillOpacity: 0.8
    };
}

var layer1 = new L.geoJson(json_DASHPOLYGONPA12_0, {
    style: styleLayer
}).addTo(map);


// ===============================
// LAYER CONTROL
// ===============================

L.control.layers(
    {
        "OpenStreetMap": osm,
        "Satellite": satellite
    },
    {
        "Lot Layer": layer1
    },
    { collapsed: false }
).addTo(map);


</script>
</body>
</html>
